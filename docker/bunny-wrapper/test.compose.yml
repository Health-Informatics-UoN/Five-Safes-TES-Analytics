services:
  db:
    image: postgres:18
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: omop
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-d", "omop"]
      interval: 5s
      timeout: 5s
      retries: 5

  omop-lite:
    image: ghcr.io/health-informatics-uon/omop-lite
    depends_on:
      depends_on:
        db:
          condition: service_healthy
    environment:
      DB_HOST: db
      DB_PASSWORD: postgres
      DB_NAME: omop
      SYNTHETIC: true
  
  bunny:
    build: .
    depends_on:
      omop-lite:
        condition: service_completed_successfully
    command:
      - "--body /var/queries/availability.json"
      - "--output /tmp/output/output.json"
    volumes:
      - ./availability.json:/var/queries/availability.json
      - ./test-output:/tmp/output
    environment:
      postgresServer: db
      postgresPort: 5432
      postgresSchema: public
      postgresDatabase: omop
      postgresUsername: postgres
      postgresPassword: postgres
      BUNNY_LOGGER_LEVEL: DEBUG